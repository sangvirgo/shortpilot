version: "3.8"

services:
  backend:
    build: ./backend
    container_name: shortpilot-backend
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: shortpilot-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
